name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release on tag

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -r requirements-windows.txt
        pip install pyinstaller

    - name: Verify runtime imports are bundled-installed
      shell: bash
      # Fail loudly if a dependency didn't install — otherwise PyInstaller
      # silently ships an .exe that crashes at startup (e.g. missing websocket).
      run: |
        set -e
        python -c "import websocket, requests, pystray, PIL, dotenv, colorama, webview; print('runtime deps OK')"

    - name: Build executable with PyInstaller
      run: |
        pyinstaller myracingdata.spec

    - name: List dist contents
      run: |
        dir dist

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: MyRacingData-Telemetry-Windows
        path: dist/MyRacingData-Telemetry.exe
        retention-days: 30

    # On a version tag, publish a GitHub Release with the .exe so the in-app
    # auto-updater (and users) have a permanent, login-free download.
    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/MyRacingData-Telemetry.exe
        generate_release_notes: true
