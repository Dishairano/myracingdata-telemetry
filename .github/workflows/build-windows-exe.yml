name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        set -e
        python -m pip install --upgrade pip
        pip install -r requirements-windows.txt
        pip install pyinstaller

    - name: Verify runtime imports are bundled-installed
      shell: bash
      # Fail loudly if a dependency didn't install — otherwise PyInstaller
      # silently ships an .exe that crashes at startup (e.g. missing websocket).
      run: |
        set -e
        python -c "import websocket, requests, pystray, PIL, dotenv, colorama; print('runtime deps OK')"

    - name: Build executable with PyInstaller
      run: |
        pyinstaller myracingdata.spec

    - name: List dist contents
      run: |
        dir dist

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: MyRacingData-Telemetry-Windows
        path: dist/MyRacingData-Telemetry.exe
        retention-days: 30
